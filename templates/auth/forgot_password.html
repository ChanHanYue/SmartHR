<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartHR – Forgot Password</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f1f0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.reset-wrap{max-width:440px;width:100%;background:#fff;border-radius:28px;padding:48px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.brand-icon{width:44px;height:44px;background:linear-gradient(135deg,#5aaa3c 0%,#3a7a28 100%);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 24px rgba(90,170,60,.25)}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#0f172a}
.brand-name span{color:#5aaa3c;font-size:11px;display:block;font-weight:400;margin-top:2px}
.reset-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#0f172a;margin-bottom:6px}
.reset-sub{color:#64748b;font-size:14px;margin-bottom:28px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:.2s;color:#0f172a}
.form-input:focus{border-color:#5aaa3c;box-shadow:0 0 0 4px rgba(90,170,60,.12)}
.btn{width:100%;padding:13px;background:#3a7a28;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s;margin-top:8px}
.btn:hover{background:#1e4a15}
.alert{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;background:#fcebeb;border:1px solid #f5c6c6;color:#a32d2d;display:flex;align-items:center;gap:8px}
.alert-success{background:#f0faf0;border-color:#a8d899;color:#1e4a15}
.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#5aaa3c;text-decoration:none}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="reset-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px;">
        <path d="M11 21C11 21 12.5 14 16 14C19.5 14 21 21 21 21" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
        <circle cx="16" cy="10" r="3.5" fill="white"/>
      </svg>
    </div>
    <div class="brand-name">SmartHR<span>Password Reset</span></div>
  </div>

  <div class="reset-title">Forgot password?</div>
  <div class="reset-sub">Enter your email and we'll send you a reset link.</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert {% if cat=='success' %}alert-success{% endif %}">
        {{ msg }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" name="email" placeholder="you@company.com" required autofocus>
    </div>
    <button class="btn" type="submit">Send Reset Link →</button>
  </form>

  <a class="back-link" href="{{ url_for('auth.login') }}">← Back to Sign In</a>
</div>
</body>
</html>
