<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:'Segoe UI',Arial,sans-serif">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9">
<tr><td align="center" style="padding:30px 10px">
  <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
    <tr>
      <td style="padding:24px 30px;background:linear-gradient(135deg,#1a6b3a,#2d8f52)">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="font-size:22px;font-weight:700;color:#ffffff;font-family:'Segoe UI',Arial,sans-serif">SmartHR</td>
            <td align="right" style="font-size:12px;color:rgba(255,255,255,0.7)">{{ title }}</td>
          </tr>
        </table>
      </td>
    </tr>
    <tr><td style="padding:30px">
      <p style="margin:0 0 6px 0;font-size:15px;color:#333">Hi <strong>{{ employee_name }}</strong>,</p>
      {% block content %}{% endblock %}
    </td></tr>
    <tr>
      <td style="padding:20px 30px;background-color:#f8faf8;border-top:1px solid #e8ece8">
        <p style="margin:0;font-size:11px;color:#8a9a8a">This is an automated message from <strong>SmartHR</strong>. Please do not reply to this email.</p>
      </td>
    </tr>
  </table>
  <p style="margin:10px 0 0;font-size:11px;color:#8a9a8a">&copy; SmartHR &mdash; AI-Powered HR Management System</p>
</td></tr>
</table>
</body>
</html>
